server:
  port: 9091
spring:
  application:
    name: service-consumer
eureka:
  client:
    service-url:
      defaultZone: http://peer1:8761/eureka/,http://peer2:8762/eureka/

# ==================== Resilience4j 配置 ====================

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: TIME_BASED    # 时间窗口型
        sliding-window-size: 10            # 窗口长度10秒
        minimum-number-of-calls: 5         # 最小调用次数5
        wait-duration-in-open-state: 5s    # OPEN→HALF_OPEN等待5秒
        permitted-number-of-calls-in-half-open-state: 3  # HALF_OPEN允许3个请求
    instances:
      # 断路器A：失败率熔断
      circuitBreakerA:
        base-config: default
        failure-rate-threshold: 30         # 失败率阈值30%
      # 断路器B：失败率+慢调用比例熔断
      circuitBreakerB:
        base-config: default
        failure-rate-threshold: 50         # 失败率阈值50%
        slow-call-rate-threshold: 30       # 慢调用比例阈值30%
        slow-call-duration-threshold: 2s   # 慢调用时间阈值2秒

  bulkhead:
    instances:
      bulkheadA:
        max-concurrent-calls: 10           # 最大并发数10
        max-wait-duration: 20ms            # 等待超时20ms

  ratelimiter:
    instances:
      rateLimiterA:
        limit-refresh-period: 2s           # 刷新周期2秒
        limit-for-period: 5                # 每周期5个请求
        timeout-duration: 0ms              # 不等待，直接拒绝

# Actuator 暴露端点
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always
